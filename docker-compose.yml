name: bookplate-dev

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./app/server:/bookplate/app/server
      # Keep the image's install for app/server; the bind mount above would
      # otherwise shadow it with the host's node_modules, hiding any dependency
      # that isn't hoisted to the root /bookplate/node_modules (e.g. smartcrop-sharp).
      - /bookplate/app/server/node_modules
      - ${BOOKS:-./dev-books}:/media/books
      - ./dev-data:/data
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-changeme}
      BOOKS_DIR: /media/books
    ports:
      - "3000:3000"

  client:
    build:
      context: ./app/client
      dockerfile: Dockerfile.dev
    volumes:
      - ./app/client/src:/app/src
      - ./app/client/index.html:/app/index.html
      - ./app/client/vite.config.ts:/app/vite.config.ts
      - ./app/client/tsconfig.json:/app/tsconfig.json
    environment:
      API_URL: http://server:3000
      DOCKER: "true"
    ports:
      - "5173:5173"
    depends_on:
      - server


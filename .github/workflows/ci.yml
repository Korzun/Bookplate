name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test-client:
    name: Client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test -w app/client

  test-server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test -w app/server

  docker-build:
    name: Docker build (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build for amd64 and arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false

  docker-smoke-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image
        run: docker build -t bookplate:smoke .
      - name: Run and verify startup
        run: |
          docker run -d --name smoke-test -p 3000:3000 bookplate:smoke
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/login -o /dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "Server failed to become ready. Logs:"
              docker logs smoke-test
              docker rm -f smoke-test
              exit 1
            fi
            sleep 1
          done
          # DB check: a login attempt with a non-admin username falls through to a
          # DB query (userStore.validateUser). A healthy DB returns 401 (user not
          # found); a broken DB would return 500 or cause the server to crash.
          LOGIN_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:3000/api/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"smoke-check","password":"x"}')
          if [ "$LOGIN_STATUS" != "401" ]; then
            echo "DB check failed: expected HTTP 401 from /api/login, got ${LOGIN_STATUS}. Logs:"
            docker logs smoke-test
            docker rm -f smoke-test
            exit 1
          fi
          echo "DB check passed (got 401 as expected)"
          docker stop smoke-test
          docker rm smoke-test
